<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ShortRadar">
<title>ShortRadar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #060609;
  --card:   #0d0d16;
  --card2:  #111120;
  --border: #191928;
  --acc:    #00ffaa;
  --blue:   #2d8fff;
  --red:    #ff2d55;
  --yellow: #ffcc00;
  --text:   #e8e8f0;
  --muted:  #44445a;
  --font-d: 'Syne', sans-serif;
  --font-m: 'DM Mono', monospace;
  --font-b: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* subtle grid bg */
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    linear-gradient(rgba(0,255,170,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,170,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

#app { position: relative; z-index: 1; }

/* ── SPLASH ────────────────────────────────────── */
#splash {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 999;
  transition: opacity 0.5s ease;
}
#splash.fade { opacity: 0; pointer-events: none; }

.splash-logo {
  font-family: var(--font-d);
  font-size: 36px; font-weight: 800;
  color: #fff; letter-spacing: -1px;
}
.splash-logo span { color: var(--acc); }

.splash-bar {
  width: 160px; height: 2px;
  background: var(--border); border-radius: 2px;
  overflow: hidden;
}
.splash-fill {
  height: 100%; background: var(--acc);
  border-radius: 2px;
  animation: splashSlide 1.4s ease infinite;
}
@keyframes splashSlide {
  0%   { width:0; margin-left:0; }
  50%  { width:60%; margin-left:20%; }
  100% { width:0; margin-left:100%; }
}
.splash-msg {
  font-family: var(--font-m);
  font-size: 10px; color: var(--muted);
  letter-spacing: 3px; text-transform: uppercase;
}

/* ── NAV ───────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(6,6,9,0.94);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
}

.nav-logo {
  font-family: var(--font-d);
  font-size: 21px; font-weight: 800;
  color: #fff; letter-spacing: -0.5px;
}
.nav-logo span { color: var(--acc); }

.nav-right { display: flex; align-items: center; gap: 10px; }

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--acc);
  box-shadow: 0 0 0 0 rgba(0,255,170,0.4);
  animation: livePop 1.6s ease infinite;
}
.live-dot.err  { background: var(--red);    box-shadow: none; animation: none; }
.live-dot.busy { background: var(--yellow); box-shadow: none; animation: none; }

@keyframes livePop {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,255,170,0.4); }
  50%      { box-shadow: 0 0 0 6px rgba(0,255,170,0); }
}

.scan-btn {
  font-family: var(--font-m);
  font-size: 11px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 8px 16px; border-radius: 3px;
  border: 1px solid var(--acc);
  background: var(--acc); color: var(--bg);
  cursor: pointer; transition: opacity 0.2s;
  -webkit-appearance: none;
}
.scan-btn:active  { opacity: 0.7; }
.scan-btn.loading { background: transparent; color: var(--acc); cursor: default; }

/* ── STAT STRIP ────────────────────────────────── */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
}
.stat {
  padding: 11px 6px; text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
}
.stat:last-child { border-right: none; }
.stat::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.stat.s-blue::before   { background: var(--blue); }
.stat.s-yellow::before { background: var(--yellow); }
.stat.s-red::before    { background: var(--red); }
.stat.s-green::before  { background: var(--acc); }

.stat-n {
  font-family: var(--font-d);
  font-size: 22px; font-weight: 800;
  color: #fff; line-height: 1;
}
.stat.s-yellow .stat-n { color: var(--yellow); }
.stat.s-red    .stat-n { color: var(--red); }
.stat.s-green  .stat-n { color: var(--acc); }

.stat-l {
  font-family: var(--font-m);
  font-size: 8px; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 3px;
}

/* ── TF + FILTER ROWS ──────────────────────────── */
.tf-row {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.tf-row::-webkit-scrollbar { display: none; }

.row-lbl {
  font-family: var(--font-m);
  font-size: 9px; color: var(--muted);
  letter-spacing: 2px; flex-shrink: 0;
}

.chip {
  flex-shrink: 0;
  font-family: var(--font-m); font-size: 10px;
  padding: 5px 13px; border-radius: 2px;
  border: 1px solid var(--border); color: var(--muted);
  background: transparent; cursor: pointer;
  letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.15s; -webkit-appearance: none;
}
.chip:active { opacity: 0.7; }

.chip.tf-on  { border-color: var(--blue);   color: var(--blue);   background: rgba(45,143,255,0.07); }
.chip.f-safe { border-color: var(--acc);    color: var(--acc);    background: rgba(0,255,170,0.06); }
.chip.f-caut { border-color: var(--yellow); color: var(--yellow); background: rgba(255,204,0,0.06); }
.chip.f-dang { border-color: var(--red);    color: var(--red);    background: rgba(255,45,85,0.06); }
.chip.f-all  { border-color: var(--acc);    color: var(--acc);    background: rgba(0,255,170,0.06); }

/* ── LEGEND ────────────────────────────────────── */
.legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  padding: 7px 16px 9px;
  border-bottom: 1px solid var(--border);
}
.leg {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-m); font-size: 9px;
  color: var(--muted); letter-spacing: 1px;
}
.leg-dot { width: 7px; height: 7px; border-radius: 1px; }

/* ── STATUS BAR ────────────────────────────────── */
.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px;
}
.status-l { font-family: var(--font-m); font-size: 9px; color: var(--muted); }
.status-r { font-family: var(--font-m); font-size: 9px; color: var(--muted); }
.status-r span { color: var(--blue); }

/* ── PROGRESS ──────────────────────────────────── */
.progress-box {
  margin: 4px 12px 6px;
  padding: 9px 14px;
  background: rgba(0,255,170,0.04);
  border: 1px solid rgba(0,255,170,0.12);
  border-radius: 3px;
  font-family: var(--font-m); font-size: 10px;
  color: var(--acc); letter-spacing: 1px;
  display: none;
}
.progress-box.show { display: block; }

/* ── ERROR BOX ─────────────────────────────────── */
.err-box {
  margin: 8px 12px;
  padding: 12px 14px;
  background: rgba(255,45,85,0.06);
  border: 1px solid var(--red);
  border-radius: 4px;
  font-family: var(--font-m); font-size: 10px;
  color: var(--red); line-height: 1.8;
  display: none;
}
.err-box.show { display: block; }

/* ── EMPTY STATE ───────────────────────────────── */
.empty {
  text-align: center; padding: 60px 20px;
  font-family: var(--font-m); font-size: 11px;
  color: var(--muted); letter-spacing: 2px;
  line-height: 3; display: none;
}
.empty.show { display: block; }
.empty small { font-size: 9px; opacity: 0.4; display: block; line-height: 2; }

/* ── CARDS ─────────────────────────────────────── */
.cards {
  padding: 6px 12px 120px;
  display: flex; flex-direction: column; gap: 10px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 5px; overflow: hidden;
  animation: cardIn 0.3s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-bar { height: 3px; }
.card-bar.SAFE    { background: linear-gradient(90deg, var(--acc),    rgba(0,255,170,0.05)); }
.card-bar.CAUTION { background: linear-gradient(90deg, var(--yellow), rgba(255,204,0,0.05)); }
.card-bar.DANGER  { background: linear-gradient(90deg, var(--red),    rgba(255,45,85,0.05)); animation: dangerPulse 2s ease infinite; }
@keyframes dangerPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.card-head {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 13px 14px 10px;
}

.coin-name {
  font-family: var(--font-d);
  font-size: 25px; font-weight: 800;
  color: #fff; letter-spacing: -0.5px; line-height: 1;
}
.coin-sub {
  font-family: var(--font-m);
  font-size: 9px; color: var(--muted);
  margin-top: 4px; letter-spacing: 1px;
}

.verdict {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: 3px;
  font-family: var(--font-d); font-size: 13px; font-weight: 800;
  border: 1px solid; letter-spacing: 0.5px;
}
.verdict.SAFE    { color: var(--acc);    border-color: var(--acc);    background: rgba(0,255,170,0.07); }
.verdict.CAUTION { color: var(--yellow); border-color: var(--yellow); background: rgba(255,204,0,0.07); }
.verdict.DANGER  { color: var(--red);    border-color: var(--red);    background: rgba(255,45,85,0.07); }

/* metrics grid */
.metrics {
  display: grid; grid-template-columns: repeat(4,1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.metric { padding: 9px 10px; border-right: 1px solid var(--border); }
.metric:last-child { border-right: none; }
.m-lbl {
  font-family: var(--font-m); font-size: 7px;
  color: var(--muted); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 4px;
}
.m-val {
  font-family: var(--font-m); font-size: 15px; font-weight: 500;
}
.c-red    { color: var(--red); }
.c-yellow { color: var(--yellow); }
.c-green  { color: var(--acc); }
.c-muted  { color: var(--muted); }

/* risk area */
.risk-area { padding: 10px 14px 13px; }

.risk-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 7px;
}
.risk-lbl {
  font-family: var(--font-m); font-size: 8px;
  color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
}
.risk-score {
  font-family: var(--font-d); font-size: 19px; font-weight: 800;
}
.risk-score sub {
  font-family: var(--font-m); font-size: 10px;
  opacity: 0.35; font-style: normal; vertical-align: baseline;
}

.risk-bar-bg {
  height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden; margin-bottom: 10px;
}
.risk-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

.checklist { display: flex; flex-direction: column; gap: 4px; }
.chk-item {
  display: flex; align-items: flex-start; gap: 6px;
  font-family: var(--font-m); font-size: 10px; line-height: 1.4;
}
.chk-item.r { color: #ff7088; }
.chk-item.y { color: #ffd060; }
.chk-item.g { color: #44ffb8; }
.chk-icon { flex-shrink: 0; font-size: 9px; margin-top: 1px; }

/* scrollbar */
::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">SHORT<span>RADAR</span></div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
  <div class="splash-msg" id="splashMsg">Connecting to Binance...</div>
</div>

<div id="app">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">SHORT<span>RADAR</span></div>
    <div class="nav-right">
      <div class="live-dot" id="dot"></div>
      <button class="scan-btn" id="scanBtn" onclick="triggerScan()">↺ SCAN</button>
    </div>
  </nav>

  <!-- STATS -->
  <div class="stats">
    <div class="stat s-blue">
      <div class="stat-n" id="sTotal">—</div>
      <div class="stat-l">Scanned</div>
    </div>
    <div class="stat s-yellow">
      <div class="stat-n" id="sOB">—</div>
      <div class="stat-l">Overbought</div>
    </div>
    <div class="stat s-red">
      <div class="stat-n" id="sDanger">—</div>
      <div class="stat-l">Danger</div>
    </div>
    <div class="stat s-green">
      <div class="stat-n" id="sSafe">—</div>
      <div class="stat-l">Safe</div>
    </div>
  </div>

  <!-- TIMEFRAME -->
  <div class="tf-row">
    <span class="row-lbl">TF:</span>
    <button class="chip tf-on" data-tf="5m"  onclick="setTF(this)">5M</button>
    <button class="chip"       data-tf="15m" onclick="setTF(this)">15M</button>
    <button class="chip"       data-tf="1h"  onclick="setTF(this)">1H</button>
    <span style="font-family:var(--font-m);font-size:8px;color:var(--muted);margin-left:auto;flex-shrink:0;letter-spacing:1px">RSI &gt; 65</span>
  </div>

  <!-- FILTERS -->
  <div class="tf-row">
    <span class="row-lbl">SHOW:</span>
    <button class="chip f-all"  data-f="all"     onclick="setFilter(this)">ALL</button>
    <button class="chip"        data-f="safe"    onclick="setFilter(this)">✓ SAFE</button>
    <button class="chip"        data-f="caution" onclick="setFilter(this)">⚠ CAUTION</button>
    <button class="chip"        data-f="danger"  onclick="setFilter(this)">✕ DANGER</button>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--acc)"></div>SAFE TO SHORT</div>
    <div class="leg"><div class="leg-dot" style="background:var(--yellow)"></div>CAUTION</div>
    <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>DANGER — AVOID</div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="status-l" id="lastScan">NOT YET SCANNED</div>
    <div class="status-r">NEXT IN <span id="cd">30</span>s</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-box" id="progress"></div>

  <!-- ERROR -->
  <div class="err-box" id="errBox"></div>

  <!-- EMPTY -->
  <div class="empty" id="emptyBox">
    NO OVERBOUGHT COINS RIGHT NOW
    <small>Market is cooling — try a different timeframe<br>or tap ↺ SCAN to retry</small>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards"></div>

</div>

<script>
'use strict';

// ── CONFIG ──────────────────────────────────────
const RSI_LEN   = 14;
const RSI_MIN   = 65;
const REFRESH   = 30;
const BASE      = 'https://fapi.binance.com/fapi/v1';

// Populated dynamically from Binance top 200 by volume
let WATCHLIST = [];

// Fetch top 200 USDT perpetuals sorted by 24h quote volume
async function fetchWatchlist() {
  const data = await get(`${BASE}/ticker/24hr`);
  return data
    .filter(d => d.symbol.endsWith('USDT') && !d.symbol.includes('_'))
    .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, 200)
    .map(d => d.symbol);
}


// ── STATE ───────────────────────────────────────
let allCoins  = [];
let tf        = '5m';
let filterVal = 'all';
let cdVal     = REFRESH;
let cdTimer, rfTimer;
let scanning  = false;

// ── RSI ─────────────────────────────────────────
function rsi(closes) {
  const p = RSI_LEN;
  if (closes.length < p + 1) return null;
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) {
    const d = closes[i] - closes[i-1];
    d > 0 ? g += d : l -= d;
  }
  let ag = g/p, al = l/p;
  for (let i = p+1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    ag = (ag*(p-1) + (d>0?d:0)) / p;
    al = (al*(p-1) + (d<0?-d:0)) / p;
  }
  return al === 0 ? 100 : 100 - 100/(1 + ag/al);
}

// ── FETCH ───────────────────────────────────────
async function get(url) {
  const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── PROCESS ONE COIN ────────────────────────────
async function processCoin(sym) {
  try {
    const limit = tf === '1h' ? 80 : 60;
    const [kl, tk] = await Promise.all([
      get(`${BASE}/klines?symbol=${sym}&interval=${tf}&limit=${limit}`),
      get(`${BASE}/ticker/24hr?symbol=${sym}`)
    ]);

    if (!Array.isArray(kl) || kl.length < 20) return null;

    const closes  = kl.map(k => parseFloat(k[4]));
    const vols    = kl.map(k => parseFloat(k[5]));
    const price   = closes.at(-1);

    const rsiNow  = rsi(closes);
    if (!rsiNow || rsiNow < RSI_MIN || rsiNow > 99.5) return null;

    const rsiPrev = rsi(closes.slice(0, -5)) || rsiNow;
    const rsiVel  = rsiNow - rsiPrev;

    const avgVol   = vols.slice(-21, -1).reduce((a,b)=>a+b, 0) / 20;
    const volSpike = avgVol > 0 ? vols.at(-1) / avgVol : 1;

    const change  = parseFloat(tk.priceChangePercent) || 0;
    if (isNaN(change)) return null;
    const hiPct   = ((price - parseFloat(tk.highPrice)) / parseFloat(tk.highPrice)) * 100;

    const { score, verdict, flags } = risk(rsiNow, rsiVel, change, volSpike, hiPct);

    return {
      sym: sym.replace('USDT',''),
      price, rsiNow, rsiVel, change, volSpike, hiPct,
      score, verdict, flags
    };
  } catch { return null; }
}

// ── RISK SCORING ────────────────────────────────
function risk(rsiV, vel, chg, vol, hiPct) {
  let s = 0; const f = [];

  if (rsiV>=85)      {s+=25;f.push({t:`RSI ${rsiV.toFixed(0)} — extreme`,    l:'r'});}
  else if(rsiV>=78)  {s+=18;f.push({t:`RSI ${rsiV.toFixed(0)} — very high`,  l:'r'});}
  else if(rsiV>=72)  {s+=10;f.push({t:`RSI ${rsiV.toFixed(0)} — high`,       l:'y'});}
  else               {s+=4; f.push({t:`RSI ${rsiV.toFixed(0)} — elevated`,   l:'g'});}

  if(vel>15)         {s+=20;f.push({t:`RSI surging +${vel.toFixed(0)} pts`,  l:'r'});}
  else if(vel>8)     {s+=12;f.push({t:`RSI accelerating +${vel.toFixed(0)}`, l:'y'});}
  else if(vel>3)     {s+=5; f.push({t:`RSI rising +${vel.toFixed(0)}`,       l:'g'});}
  else               {      f.push({t:`Momentum flat`,                        l:'g'});}

  if(chg>30)         {s+=25;f.push({t:`+${chg.toFixed(1)}% — PARABOLIC 🚨`,  l:'r'});}
  else if(chg>15)    {s+=18;f.push({t:`+${chg.toFixed(1)}% — explosive`,     l:'r'});}
  else if(chg>8)     {s+=10;f.push({t:`+${chg.toFixed(1)}% — strong day`,    l:'y'});}
  else if(chg>3)     {s+=4; f.push({t:`+${chg.toFixed(1)}% — moderate`,      l:'g'});}
  else if(chg<-3)    {s-=5; f.push({t:`${chg.toFixed(1)}% — weakening`,      l:'g'});}
  else               {      f.push({t:`${chg.toFixed(1)}% — quiet`,           l:'g'});}

  if(vol>8)          {s+=20;f.push({t:`Vol ×${vol.toFixed(1)} — EXTREME`,    l:'r'});}
  else if(vol>4)     {s+=14;f.push({t:`Vol ×${vol.toFixed(1)} — very high`,  l:'r'});}
  else if(vol>2.5)   {s+=8; f.push({t:`Vol ×${vol.toFixed(1)} — elevated`,   l:'y'});}
  else if(vol>1.5)   {s+=3; f.push({t:`Vol ×${vol.toFixed(1)} — normal`,     l:'g'});}
  else               {      f.push({t:`Vol ×${vol.toFixed(1)} — below avg`,  l:'g'});}

  if(hiPct>-1)       {s+=10;f.push({t:`At/above daily high`,                  l:'r'});}
  else if(hiPct>-3)  {s+=6; f.push({t:`Near daily high (${hiPct.toFixed(1)}%)`,l:'y'});}
  else               {      f.push({t:`Below daily high (${hiPct.toFixed(1)}%)`,l:'g'});}

  return {
    score:   Math.min(s, 100),
    verdict: s>=55 ? 'DANGER' : s>=30 ? 'CAUTION' : 'SAFE',
    flags: f
  };
}

// ── MAIN SCAN ───────────────────────────────────
async function scan() {
  if (scanning) return;
  scanning = true;

  setDot('busy');
  setBtnLoading(true);
  hideErr();
  setProgress('Fetching top 200 coins from Binance...');

  try {
    WATCHLIST = await fetchWatchlist();
    setProgress(`Got ${WATCHLIST.length} coins — scanning for RSI > 65...`);

    const results = [];
    const BS = 10;

    for (let i = 0; i < WATCHLIST.length; i += BS) {
      const batch = WATCHLIST.slice(i, i + BS);
      const pct   = Math.round((i / WATCHLIST.length) * 100);
      setProgress(`Scanning ${Math.min(i+BS, WATCHLIST.length)}/${WATCHLIST.length} coins... ${pct}%`);

      const batchRes = await Promise.all(batch.map(processCoin));
      const valid    = batchRes.filter(Boolean);
      results.push(...valid);

      // Show coins as they arrive
      if (valid.length) {
        allCoins = [...results];
        renderCards();
        updateStats(results);
        hideSplash();
      }
    }

    allCoins = results;
    renderCards();
    updateStats(results);

    document.getElementById('lastScan').textContent =
      new Date().toLocaleTimeString() + ' · ' + tf.toUpperCase();

    setDot(results.length ? 'live' : 'err');
    hideProgress();

    if (results.length === 0) showEmpty();
    hideSplash();

  } catch (e) {
    showErr('Connection failed: ' + e.message + '\n\nMake sure you\'re opening this in Safari with internet access.');
    setDot('err');
    hideProgress();
    hideSplash();
  }

  scanning = false;
  setBtnLoading(false);
  resetCd();
}

// ── RENDER CARDS ────────────────────────────────
function renderCards() {
  let data = [...allCoins];

  if (filterVal === 'safe')    data = data.filter(c => c.verdict === 'SAFE');
  if (filterVal === 'caution') data = data.filter(c => c.verdict === 'CAUTION');
  if (filterVal === 'danger')  data = data.filter(c => c.verdict === 'DANGER');

  data.sort((a,b) => {
    const o = {DANGER:3,CAUTION:2,SAFE:1};
    return o[b.verdict]-o[a.verdict] || b.score-a.score;
  });

  const container = document.getElementById('cards');
  const empty     = document.getElementById('emptyBox');

  if (data.length === 0 && allCoins.length > 0) {
    container.innerHTML = '';
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  const verdictColor = v =>
    v==='DANGER' ? 'var(--red)' : v==='CAUTION' ? 'var(--yellow)' : 'var(--acc)';

  const verdictIcon = v => v==='SAFE' ? '✓' : v==='CAUTION' ? '⚠' : '✕';

  const rsiColor = r =>
    r >= 80 ? 'c-red' : r >= 72 ? 'c-yellow' : 'c-muted';

  const volColor = v =>
    v >= 4 ? 'c-red' : v >= 2 ? 'c-yellow' : 'c-muted';

  const chgColor = c =>
    c > 15 ? 'c-red' : c > 5 ? 'c-yellow' : c < 0 ? 'c-green' : 'c-muted';

  const fmtPrice = p =>
    p >= 10000 ? `$${p.toFixed(0)}`
    : p >= 1000 ? `$${p.toFixed(1)}`
    : p >= 1    ? `$${p.toFixed(3)}`
    : `$${p.toFixed(5)}`;

  const flagIcon = l => l==='r'?'✕':l==='y'?'▲':'✓';

  container.innerHTML = data.map((c, i) => `
    <div class="card" style="animation-delay:${i*0.04}s">
      <div class="card-bar ${c.verdict}"></div>

      <div class="card-head">
        <div>
          <div class="coin-name">${c.sym}</div>
          <div class="coin-sub">${fmtPrice(c.price)} · USDT PERP · ${tf.toUpperCase()}</div>
        </div>
        <div class="verdict ${c.verdict}">
          ${verdictIcon(c.verdict)} ${c.verdict}
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="m-lbl">RSI</div>
          <div class="m-val ${rsiColor(c.rsiNow)}">${c.rsiNow.toFixed(1)}</div>
        </div>
        <div class="metric">
          <div class="m-lbl">24H %</div>
          <div class="m-val ${chgColor(c.change)}">${c.change>0?'+':''}${c.change.toFixed(1)}%</div>
        </div>
        <div class="metric">
          <div class="m-lbl">VOL ×</div>
          <div class="m-val ${volColor(c.volSpike)}">×${c.volSpike.toFixed(1)}</div>
        </div>
        <div class="metric">
          <div class="m-lbl">RISK</div>
          <div class="m-val" style="color:${verdictColor(c.verdict)}">${c.score}</div>
        </div>
      </div>

      <div class="risk-area">
        <div class="risk-header">
          <div class="risk-lbl">PARABOLIC RISK SCORE</div>
          <div class="risk-score" style="color:${verdictColor(c.verdict)}">
            ${c.score}<sub>/100</sub>
          </div>
        </div>
        <div class="risk-bar-bg">
          <div class="risk-bar-fill"
            style="width:${c.score}%;background:${verdictColor(c.verdict)}">
          </div>
        </div>
        <div class="checklist">
          ${c.flags.map(f=>`
            <div class="chk-item ${f.l}">
              <span class="chk-icon">${flagIcon(f.l)}</span>${f.t}
            </div>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

// ── UI HELPERS ───────────────────────────────────
function updateStats(results) {
  document.getElementById('sTotal').textContent  = WATCHLIST.length || '—';
  document.getElementById('sOB').textContent     = results.length;
  document.getElementById('sDanger').textContent = results.filter(c=>c.verdict==='DANGER').length;
  document.getElementById('sSafe').textContent   = results.filter(c=>c.verdict==='SAFE').length;
}

function setDot(state) {
  const d = document.getElementById('dot');
  d.className = 'live-dot' + (state==='err'?'  err':state==='busy'?' busy':'');
}

function setBtnLoading(on) {
  const b = document.getElementById('scanBtn');
  b.textContent = on ? '⏳ SCANNING' : '↺ SCAN';
  b.className   = 'scan-btn' + (on ? ' loading' : '');
  b.disabled    = on;
}

function setProgress(msg) {
  const p = document.getElementById('progress');
  p.textContent = '⬡ ' + msg;
  p.classList.add('show');
}

function hideProgress() {
  document.getElementById('progress').classList.remove('show');
}

function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = '⚠ ' + msg;
  e.classList.add('show');
}

function hideErr() {
  document.getElementById('errBox').classList.remove('show');
}

function showEmpty() {
  document.getElementById('emptyBox').classList.add('show');
}

function hideSplash() {
  document.getElementById('splash').classList.add('fade');
}

// ── CONTROLS ────────────────────────────────────
function setTF(btn) {
  if (scanning) return;
  document.querySelectorAll('[data-tf]').forEach(b => b.classList.remove('tf-on'));
  btn.classList.add('tf-on');
  tf = btn.dataset.tf;
  allCoins = [];
  document.getElementById('cards').innerHTML = '';
  document.getElementById('emptyBox').classList.remove('show');
  scan();
}

function setFilter(btn) {
  document.querySelectorAll('[data-f]').forEach(b => {
    b.className = 'chip';
  });
  const cls = {all:'f-all',safe:'f-safe',caution:'f-caut',danger:'f-dang'}[btn.dataset.f];
  btn.className = 'chip ' + cls;
  filterVal = btn.dataset.f;
  renderCards();
}

function resetCd() {
  clearInterval(cdTimer); clearTimeout(rfTimer);
  cdVal = REFRESH;
  document.getElementById('cd').textContent = cdVal;
  cdTimer = setInterval(() => {
    cdVal--;
    document.getElementById('cd').textContent = cdVal;
    if (cdVal <= 0) clearInterval(cdTimer);
  }, 1000);
  rfTimer = setTimeout(scan, REFRESH * 1000);
}

function triggerScan() {
  clearInterval(cdTimer); clearTimeout(rfTimer);
  allCoins = [];
  document.getElementById('cards').innerHTML = '';
  document.getElementById('emptyBox').classList.remove('show');
  scan();
}

// ── BOOT ────────────────────────────────────────
document.getElementById('splashMsg').textContent = 'Loading Binance Futures data...';
scan();
</script>
</body>
</html>
